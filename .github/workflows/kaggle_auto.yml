name: Run Code on Kaggle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-to-kaggle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation de Kaggle API
        run: pip install kaggle

      - name: Envoi et Lancement sur Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          # Création forcée de l'arborescence lue par l'outil Kaggle
          mkdir -p /home/runner/.config/kaggle
          mkdir -p ~/.kaggle
          
          # Écriture du token officiel KGAT dans les deux dossiers pour éviter tout conflit
          echo "$KAGGLE_API_TOKEN" > /home/runner/.config/kaggle/access_token
          echo "$KAGGLE_API_TOKEN" > ~/.kaggle/access_token
          
          # Simulation d'un fichier JSON minimal requis par l'initialisation de l'API
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"\"}" > /home/runner/.config/kaggle/kaggle.json
          echo "{\"username\":\"$KAGGLE_USERNAME\",\"key\":\"\"}" > ~/.kaggle/kaggle.json
          
          # Sécurisation des permissions des fichiers créés
          chmod 600 /home/runner/.config/kaggle/access_token /home/runner/.config/kaggle/kaggle.json
          chmod 600 ~/.kaggle/access_token ~/.kaggle/kaggle.json
          
          # Préparation et envoi du projet
          mkdir -p push_dir
          cp main.py push_dir/
          cd push_dir
          
          echo '{
            "id": "nesine/tomato-auto-inference",
            "title": "tomato-auto-inference",
            "code_file": "main.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": "true",
            "enable_gpu": "true",
            "enable_internet": "true",
            "dataset_access_tokens": [
              "nesine/dataset-test",
              "nesine/tomato-model-ensemble-learning-v1"
            ],
            "competition_sources": [],
            "kernel_sources": []
          }' > kernel-metadata.json
          
          # Lancement de l'exécution sur Kaggle
          kaggle kernels push
