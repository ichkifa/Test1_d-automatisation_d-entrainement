name: Run Code on Kaggle

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy-to-kaggle:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      - name: Configuration de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Installation de Kaggle API
        run: pip install kaggle

      - name: Envoi et Lancement sur Kaggle
        env:
          KAGGLE_USERNAME: ${{ secrets.KAGGLE_USERNAME }}
          KAGGLE_API_TOKEN: ${{ secrets.KAGGLE_API_TOKEN }}
        run: |
          mkdir -p push_dir
          cp main.py push_dir/
          cd push_dir
          
          echo '{
            "id": "nesine/tomato-auto-inference",
            "title": "tomato-auto-inference",
            "code_file": "main.py",
            "language": "python",
            "kernel_type": "script",
            "is_private": "true",
            "enable_gpu": "true",
            "enable_internet": "true",
            "dataset_access_tokens": [
              "nesine/dataset-test",
              "nesine/tomato-model-ensemble-learning-v1"
            ],
            "competition_sources": [],
            "kernel_sources": []
          }' > kernel-metadata.json
          
          # La commande utilise directement les variables d'environnement déclarées au-dessus
          kaggle kernels push
